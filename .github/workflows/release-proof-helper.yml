name: Release Proof Helper Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Desktop release tag to build. Do not reuse proof-helper-v0.1.0.
        required: true
        type: string
      publish_release:
        description: Publish immediately instead of leaving the GitHub release as a draft.
        required: true
        default: false
        type: boolean
      signed_release:
        description: Mark release notes as signed. Use only after Authenticode signatures are verified.
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  PROOF_HELPER_APP_DIR: apps/proof-helper-desktop
  PROOF_HELPER_TAURI_DIR: apps/proof-helper-desktop/src-tauri
  WINDOWS_TARGET: x86_64-pc-windows-msvc
  WINDOWS_SIDECAR: proof-tool-x86_64-pc-windows-msvc.exe

jobs:
  checks:
    name: Release checks
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Refuse reserved portable-helper tag
        shell: bash
        run: |
          if [[ "${{ inputs.tag }}" == "proof-helper-v0.1.0" ]]; then
            echo "::error::proof-helper-v0.1.0 is reserved for portable fixture-helper bundles. Use a new desktop tag."
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            packages/client-ts/pnpm-lock.yaml
            apps/ownership-proof-web/pnpm-lock.yaml
            apps/proof-helper-desktop/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - name: Go tests
        run: go test ./...

      - name: Client package
        working-directory: packages/client-ts
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm build

      - name: Ownership website
        working-directory: apps/ownership-proof-web
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm typecheck
          pnpm build

      - name: Desktop frontend
        working-directory: apps/proof-helper-desktop
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm typecheck
          pnpm build

      - name: Desktop key-bundle core
        run: cargo test --manifest-path apps/proof-helper-desktop/src-tauri/key-bundle-core/Cargo.toml

      - name: Desktop sidecar core
        run: cargo test --manifest-path apps/proof-helper-desktop/src-tauri/sidecar-core/Cargo.toml

      - name: Desktop Tauri command tests
        run: cargo test --manifest-path apps/proof-helper-desktop/src-tauri/Cargo.toml

  build-windows:
    name: Build Windows desktop artifacts
    needs: checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/proof-helper-desktop/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Windows sidecar
        shell: bash
        run: |
          mkdir -p "$PROOF_HELPER_TAURI_DIR/binaries"
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" \
            -o "$PROOF_HELPER_TAURI_DIR/binaries/$WINDOWS_SIDECAR" \
            ./cmd/proof-tool
          test -s "$PROOF_HELPER_TAURI_DIR/binaries/$WINDOWS_SIDECAR"

      - name: Desktop dependencies
        working-directory: apps/proof-helper-desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri Windows bundle
        working-directory: apps/proof-helper-desktop
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Stage Windows release artifacts
        working-directory: apps/proof-helper-desktop
        shell: bash
        env:
          PROOF_HELPER_WINDOWS_SIGNED: ${{ inputs.signed_release && '1' || '0' }}
        run: |
          pnpm release:stage-windows -- \
            --tag "${{ inputs.tag }}" \
            --bundle-dir "src-tauri/target/x86_64-pc-windows-msvc/release/bundle" \
            --sidecar "src-tauri/binaries/proof-tool-x86_64-pc-windows-msvc.exe" \
            --out-dir "../../dist/proof-helper-windows-x64"

      - name: Release notes
        shell: bash
        run: |
          mkdir -p dist/proof-helper-windows-x64
          signing_status="Unsigned preview"
          if [[ "${{ inputs.signed_release }}" == "true" ]]; then
            signing_status="Signed release"
          fi
          {
            echo "Proof Helper Windows ${{ inputs.tag }}"
            echo
            echo "- Target: x86_64-pc-windows-msvc"
            echo "- Signing status: ${signing_status}"
            echo "- Proof-assets descriptor: proof-assets-ownership-destination-v1-preprod-d2c944d-r3"
            echo "- Proof-assets download route: not configured unless the release manifest says download_configured is true"
            echo
            echo "Do not describe this as a general Windows end-user release until Authenticode signatures, a public proof-assets download route, and local Windows release-build validation are complete."
          } > dist/proof-helper-windows-x64/release-notes.md

      - uses: actions/upload-artifact@v4
        with:
          name: proof-helper-windows-x64
          path: dist/proof-helper-windows-x64/*

  draft-release:
    name: Draft GitHub release
    needs: build-windows
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: proof-helper-windows-x64
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Proof Helper Windows ${{ inputs.tag }}
          draft: ${{ inputs.publish_release != true }}
          prerelease: true
          body_path: release-artifacts/release-notes.md
          files: |
            release-artifacts/*
