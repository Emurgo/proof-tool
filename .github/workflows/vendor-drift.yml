name: Vendor drift / prover patch

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  vendor-patch:
    name: go mod vendor + prove-stream.patch builds
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Bootstrap vendor tree (go mod vendor + patch)
        run: bash scripts/bootstrap-vendor.sh

      - name: Verify no drift
        run: bash scripts/check-vendor-drift.sh

      - name: Build and vet
        run: |
          go build ./...
          go vet ./...

      - name: Prover package tests
        run: go test ./internal/msmengine/... ./internal/streampk/... ./internal/streamprove/...

      - name: WASM builds
        run: |
          GOOS=js GOARCH=wasm go build -o /tmp/proof-destination.wasm ./cmd/wasm-prover
          GOOS=js GOARCH=wasm go build -o /tmp/msmworker.wasm ./cmd/msmworker
