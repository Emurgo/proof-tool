version: "2"

run:
  timeout: 10m
  build-tags: []

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
  settings:
    errcheck:
      # Deferred/best-effort closes and removes are pervasive and intentional.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - os.Remove
        - os.RemoveAll
  exclusions:
    generated: lax
    paths:
      - vendor
      - experiments

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - vendor
      - experiments
